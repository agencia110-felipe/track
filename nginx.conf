# /etc/nginx/sites-available/konverta
#
# ARQUIVO SEPARADO — não toca em nenhuma configuração existente.
# Só é ativado com: sudo ln -s /etc/nginx/sites-available/konverta /etc/nginx/sites-enabled/konverta

server {
    listen 80;
    server_name track.agencia110.com.br;

    # Certbot vai substituir este bloco pelo HTTPS automaticamente
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name track.agencia110.com.br;

    # Certificados gerados pelo Certbot (serão preenchidos automaticamente)
    ssl_certificate     /etc/letsencrypt/live/track.agencia110.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/track.agencia110.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Logs isolados — não mistura com outros sites
    access_log /var/log/nginx/konverta_access.log;
    error_log  /var/log/nginx/konverta_error.log;

    # Tamanho máximo do body (para webhooks com payload grande)
    client_max_body_size 2M;

    # Timeouts adequados para chamadas server-side às APIs
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # Cache do script JS do cliente (5 minutos, igual à config da app)
    location ~* ^/c/ {
        proxy_pass       http://127.0.0.1:3001;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Cache-Control "public, max-age=300";
    }
}
